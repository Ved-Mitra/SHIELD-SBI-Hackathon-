name: iOS Demo Build

on:
  push:
    paths:
      - "mobile/iosApp/**"
      - "mobile/shared/**"
      - "mobile/androidApp/**"
      - "mobile/gradle/**"
      - ".github/workflows/**"
      - "mobile/gradlew"
      - "mobile/build.gradle.kts"
      - "mobile/settings.gradle.kts"
  pull_request:
    paths:
      - "mobile/iosApp/**"
      - "mobile/shared/**"
      - "mobile/androidApp/**"
  workflow_dispatch:

jobs:
  build-ios-demo:
    runs-on: macos-14 # Specifically using macOS 14 for stable Xcode 15/16 environments
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradlew Executable
        run: cd mobile && chmod +x gradlew

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      # Compiles the native iOS application UI wrapper
      - name: Build iOS App (Simulator)
        run: |
          cd mobile
          xcodebuild \
            -project "iosApp/iosApp.xcodeproj" \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            IPHONEOS_DEPLOYMENT_TARGET="18.0" \
            OTHER_LDFLAGS='$(inherited)' \
            FRAMEWORK_SEARCH_PATHS='"$(SRCROOT)/../shared/build/xcode-frameworks"' \
            build